# URLs de los micrositios oficiales de cada programa de pregrado UPTC sede Tunja.
# Solo Ing. Sistemas tiene URL conocida y verificada. Las demás están como
# placeholders — UPTC no expone un sitemap accesible y las facultades cargan
# los listados via JS, así que hay que descubrirlas manualmente navegando
# uptc.edu.co/facultades.
#
# Para llenar una URL faltante:
#   1. Ir a uptc.edu.co y buscar el programa
#   2. Copiar la URL del micrositio del programa (que termina en /index.html)
#   3. Pegarla acá y correr `python3 scrape_uptc.py`
#
# Los programas con `url: null` se omiten del scraping pero NO se borran del
# JSON existente (sus campos se conservan).

programs:
